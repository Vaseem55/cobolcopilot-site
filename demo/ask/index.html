<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ask MainframeLore — live Q&amp;A over the CardDemo estate</title>
<meta name="description" content="Ask a question about the AWS CardDemo COBOL estate and get a cited answer, grounded in parsed source facts.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#090C11; --panel:#141A22; --panel2:#1A2230; --line:#25313F;
  --amber:#E8A33D; --amber-dim:#8A6524;
  --cyan:#4FE0D6; --cyan-dim:#1F6D67; --violet:#8C7CFF;
  --slate:#8FA0AF; --bright:#EEF3F7;
  --serif:"IBM Plex Serif",Georgia,serif;
  --sans:"IBM Plex Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(ellipse 900px 500px at 12% -10%, rgba(232,163,61,.10), transparent 60%),
    radial-gradient(ellipse 900px 600px at 90% 10%, rgba(79,224,214,.10), transparent 60%),
    var(--ink);
  background-attachment:fixed;
  color:var(--slate);font-family:var(--sans);font-size:16px;line-height:1.65;min-height:100vh;
  position:relative;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background-image:
    linear-gradient(rgba(143,160,175,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(143,160,175,.05) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 75% 55% at 50% 0%, #000 30%, transparent 78%);
}
a{color:var(--cyan)}
:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.wrap{max-width:800px;margin:0 auto;padding:52px 24px 90px;position:relative;z-index:1}
nav{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;position:sticky;top:0;z-index:20;
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  background:rgba(9,12,17,.62);border-bottom:1px solid rgba(37,49,63,.7)}
.logo{font-family:var(--mono);color:var(--bright);font-size:1rem;letter-spacing:.02em}
.logo b{color:var(--amber);text-shadow:0 0 10px rgba(232,163,61,.6)}
nav a{color:var(--slate);font-size:.88rem;text-decoration:none}
nav a:hover{color:var(--cyan)}

.reveal{opacity:0;transform:translateY(14px);animation:rise .6s cubic-bezier(.16,.9,.35,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}

.eyebrow{font-family:var(--mono);font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);
  display:flex;align-items:center;gap:8px;margin-bottom:14px}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);
  box-shadow:0 0 8px 1px var(--amber);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{50%{opacity:.35}}
h1{font-family:var(--serif);color:var(--bright);font-size:2.1rem;margin-bottom:12px;font-weight:600}
.sub{color:var(--slate);margin-bottom:34px;font-size:1rem;max-width:640px}
.sub b{color:var(--cyan)}

.searchcard{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px;
  box-shadow:0 30px 70px -30px rgba(0,0,0,.7), 0 0 50px -20px rgba(79,224,214,.12);
  position:relative;overflow:hidden;margin-bottom:14px;
}
.searchcard::before{
  content:"";position:absolute;top:0;left:-40%;width:40%;height:2px;
  background:linear-gradient(90deg, transparent, var(--cyan), transparent);
  box-shadow:0 0 16px 2px rgba(79,224,214,.7);
  animation:idle-sweep 5s linear infinite;
}
@keyframes idle-sweep{0%{left:-40%}100%{left:100%}}
.askbox{display:flex;gap:8px}
input[type=text]{flex:1;background:transparent;border:none;border-radius:10px;
  color:var(--bright);font-family:var(--mono);font-size:.98rem;padding:16px 18px}
input[type=text]::placeholder{color:#5c6b79}
input[type=text]:focus{outline:none}
.searchcard:focus-within{border-color:var(--cyan-dim);box-shadow:0 30px 70px -30px rgba(0,0,0,.7), 0 0 0 3px rgba(79,224,214,.15)}
button#ask{background:var(--amber);color:var(--ink);border:none;border-radius:10px;font-family:var(--mono);
  font-size:.92rem;font-weight:500;padding:14px 24px;cursor:pointer;
  box-shadow:0 0 0 1px rgba(232,163,61,.4),0 4px 20px -4px rgba(232,163,61,.5);
  transition:box-shadow .2s,transform .2s}
button#ask:hover{background:#f0b458;transform:translateY(-1px)}
button#ask:disabled{opacity:.45;cursor:default;transform:none}

.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px}
.ex{font-family:var(--mono);font-size:.79rem;color:var(--cyan);background:rgba(79,224,214,.05);
  border:1px solid var(--cyan-dim);border-radius:16px;padding:7px 15px;cursor:pointer;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  opacity:0;transform:translateY(8px);animation:rise .5s cubic-bezier(.16,.9,.35,1) forwards}
.ex:hover{border-color:var(--cyan);box-shadow:0 0 16px -6px rgba(79,224,214,.5);transform:translateY(-1px)}
.ex:active{transform:translateY(0)}

.status{display:flex;align-items:center;gap:10px;color:var(--slate);font-family:var(--mono);font-size:.85rem;margin-bottom:18px;min-height:20px}
.status.err{color:#e08a8a}
.scan-dots{display:inline-flex;gap:4px}
.scan-dots span{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:dot-pulse 1.1s ease-in-out infinite}
.scan-dots span:nth-child(2){animation-delay:.15s}
.scan-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot-pulse{0%,60%,100%{opacity:.25;transform:scale(1)}30%{opacity:1;transform:scale(1.4)}}

#result{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:30px;
  display:none;font-size:.98rem;line-height:1.8;
  box-shadow:0 30px 70px -30px rgba(0,0,0,.7);
}
#result.show{display:block;animation:result-in .55s cubic-bezier(.16,.9,.35,1) both}
@keyframes result-in{from{opacity:0;transform:translateY(16px) scale(.99)}to{opacity:1;transform:none}}
#result code{font-family:var(--mono);background:#0C1119;padding:2px 7px;border-radius:4px;font-size:.86em;color:var(--cyan)}
#result pre{background:#0C1119;border:1px solid var(--line);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:12px 0;font-size:.85em}
#result h2,#result h3{font-family:var(--serif);color:var(--bright);margin:16px 0 10px}
#result strong{color:var(--bright)}
.hits{margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.hits .label{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-bottom:10px;display:block}
.hit-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.76rem;color:var(--amber);
  background:rgba(232,163,61,.06);border:1px solid var(--amber-dim);border-radius:6px;padding:5px 10px;margin:0 6px 6px 0}
.hit-chip::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--amber);flex-shrink:0}

footer{margin-top:60px;padding-top:24px;border-top:1px solid var(--line);font-family:var(--mono);font-size:.75rem;color:#5c6b79}

@media (max-width:640px){
  .askbox{flex-direction:column}
  button#ask{width:100%}
}
@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto}
  .reveal,.ex{animation:none;opacity:1;transform:none}
  .eyebrow::before,.searchcard::before,.scan-dots span{animation:none}
  #result.show{animation:none}
}
</style>
</head>
<body>
<nav>
  <span class="logo"><b>//</b>MAINFRAME·LORE</span>
  <a href="../../">← Back to site</a>
</nav>
<div class="wrap">
  <p class="eyebrow reveal" style="animation-delay:.05s">Live Q&amp;A · CardDemo estate</p>
  <h1 class="reveal" style="animation-delay:.1s">Ask the estate</h1>
  <p class="sub reveal" style="animation-delay:.16s">44 programs, 46 batch jobs, fully parsed and indexed.
  Every answer cites <b>program, paragraph, and line</b> — grounded in real source, never guessed.</p>

  <div class="searchcard reveal" style="animation-delay:.22s">
    <div class="askbox">
      <input type="text" id="q" placeholder="e.g. where is interest calculated?" autocomplete="off">
      <button id="ask">Ask</button>
    </div>
  </div>
  <div class="examples">
    <button class="ex" style="animation-delay:.3s">Where is interest calculated?</button>
    <button class="ex" style="animation-delay:.36s">Which jobs write to the transaction file?</button>
    <button class="ex" style="animation-delay:.42s">What happens when a card fails validation?</button>
    <button class="ex" style="animation-delay:.48s">What does CBACT04C do?</button>
  </div>

  <div class="status" id="status"></div>
  <div id="result"></div>

  <footer>PARSED, NOT GUESSED · EVERY ANSWER CITED · mainframelore.com</footer>
</div>

<script>
const WORKER_URL = "https://mainframelore-qa.vaseemakrams55.workers.dev/";
const q = document.getElementById("q"), askBtn = document.getElementById("ask"),
      result = document.getElementById("result"), status = document.getElementById("status");
const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function renderMarkdownish(text){
  let html = escapeHtml(text);
  html = html.replace(/```([\s\S]*?)```/g, (_, code) => "<pre>" + code.trim() + "</pre>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  return html;
}

async function ask(question){
  if (!question.trim()) return;
  askBtn.disabled = true;
  result.classList.remove("show");
  status.className = "status";
  status.innerHTML = 'Searching the estate and asking Claude'
    + (reduced ? '…' : '<span class="scan-dots"><span></span><span></span><span></span></span>');
  try {
    const resp = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "Request failed");
    result.innerHTML = renderMarkdownish(data.answer || "No answer returned.");
    if (data.hits && data.hits.length) {
      const hitsHtml = data.hits.map(h => `<span class="hit-chip">${h.ref} @ ${h.path}:${h.line}</span>`).join("");
      result.innerHTML += `<div class="hits"><span class="label">Sources retrieved</span>${hitsHtml}</div>`;
    }
    result.classList.add("show");
    status.textContent = "";
  } catch (e) {
    status.textContent = "Error: " + e.message + " — try again in a moment.";
    status.className = "status err";
  } finally {
    askBtn.disabled = false;
  }
}

askBtn.addEventListener("click", () => ask(q.value));
q.addEventListener("keydown", (e) => { if (e.key === "Enter") ask(q.value); });
document.querySelectorAll(".ex").forEach(btn => {
  btn.addEventListener("click", () => { q.value = btn.textContent; ask(btn.textContent); });
});
</script>
</body>
</html>
